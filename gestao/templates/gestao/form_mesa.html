{% extends 'gestao/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-1">{{ titulo }}</h2>
                <p class="text-muted mb-4">Preenche os campos abaixo</p>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">
                                <i class="bi bi-exclamation-circle"></i> {{ field.errors|striptags }}
                            </div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-dark flex-fill">
                            <i class="bi bi-check-circle"></i> Guardar
                        </button>
                        <a href="{% url 'lista_mesas' %}" class="btn btn-outline-secondary flex-fill">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
