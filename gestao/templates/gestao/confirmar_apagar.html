{% extends 'gestao/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm text-center">
            <div class="card-body p-5">
                <div style="background:#fff0f0; border-radius:50%; width:80px; height:80px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                    <span style="font-size:2.5rem;">🗑️</span>
                </div>
                <h3 class="fw-bold text-danger mb-2">Confirmar Eliminação</h3>
                <p class="text-muted mb-4">Tens a certeza que queres apagar <strong>{{ objeto }}</strong>? Esta ação não pode ser desfeita.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash"></i> Sim, apagar
                        </button>
                        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
