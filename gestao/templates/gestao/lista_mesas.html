{% extends 'gestao/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold mb-1">🪑 Mesas</h2>
        <p class="text-muted mb-0">Gerir as mesas do restaurante</p>
    </div>
    <a href="{% url 'criar_mesa' %}" class="btn btn-dark">
        <i class="bi bi-plus-circle"></i> Nova Mesa
    </a>
</div>

<div class="row g-4">
    {% for mesa in mesas %}
    <div class="col-md-3">
        <div class="card text-center h-100">
            <div class="card-body p-4">
                <div style="background:#f0f0f0; border-radius:12px; padding:16px; margin-bottom:12px;">
                    <span style="font-size:2.5rem;">🪑</span>
                </div>
                <h4 class="fw-bold">Mesa {{ mesa.numero }}</h4>
                <p class="text-muted mb-3">
                    <i class="bi bi-people"></i> {{ mesa.capacidade }} pessoas
                </p>
                <div class="d-flex gap-2 justify-content-center">
                    <a href="{% url 'editar_mesa' mesa.pk %}" class="btn btn-sm btn-outline-warning">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <a href="{% url 'apagar_mesa' mesa.pk %}" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i> Apagar
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12 text-center py-5 text-muted">
        <i class="bi bi-inbox" style="font-size:2rem;"></i>
        <p class="mt-2">Nenhuma mesa encontrada.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
