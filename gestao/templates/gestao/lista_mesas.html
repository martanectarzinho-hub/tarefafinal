{% extends 'gestao/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold mb-1">🪑 Mesas</h2>
        <p class="text-muted mb-0">Gerir as mesas do restaurante</p>
    </div>
    <a href="{% url 'criar_mesa' %}" class="btn btn-dark">
        <i class="bi bi-plus-circle"></i> Nova Mesa
    </a>
</div>

<div class="row g-4">
    {% for mesa in mesas %}
    <div class="col-md-3">
        <div class="card h-100 text-center" style="border-top: 4px solid #2ec4b6; transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
            <div class="card-body p-4">
                <div style="background: linear-gradient(135deg, #e0f7f5, #b2ebf2); border-radius:16px; padding:20px; margin-bottom:16px;">
                    <i class="bi bi-grid-3x3" style="font-size:3rem; color:#2ec4b6;"></i>
                </div>
                <h4 class="fw-bold mb-1">Mesa {{ mesa.numero }}</h4>
                <p class="text-muted mb-1">
                    <i class="bi bi-people-fill"></i> {{ mesa.capacidade }} pessoas
                </p>
                <span class="badge bg-success mb-3">Disponível</span>
                <div class="d-flex gap-2 justify-content-center">
                    <a href="{% url 'editar_mesa' mesa.pk %}" class="btn btn-sm btn-outline-warning">
                        <i class="bi bi-pencil"></i> Editar
                    </a>
                    <a href="{% url 'apagar_mesa' mesa.pk %}" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i> Apagar
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12">
        <div class="card text-center py-5">
            <div class="card-body text-muted">
                <i class="bi bi-inbox" style="font-size:3rem;"></i>
                <p class="mt-3 fs-5">Nenhuma mesa encontrada.</p>
                <a href="{% url 'criar_mesa' %}" class="btn btn-dark mt-2">
                    <i class="bi bi-plus-circle"></i> Criar primeira mesa
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
