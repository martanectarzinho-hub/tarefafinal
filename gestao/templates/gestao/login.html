{% extends 'gestao/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <span style="font-size: 3rem;">🍕</span>
                    <h3 class="mt-2 fw-bold">Bem-vindo</h3>
                    <p class="text-muted">Sistema de Gestão de Restaurante</p>
                </div>
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-danger{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-person"></i> Utilizador
                        </label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="Nome de utilizador" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-lock"></i> Password
                        </label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0 text-muted" style="font-size: 0.9rem;">
                        Não tem uma conta no sistema?
                    </p>
                    <a href="{% url 'registar' %}" class="btn btn-outline-dark w-100 mt-2">
                        <i class="bi bi-person-plus"></i> Criar Nova Conta
                    </a>
                </div>
                </div>
        </div>
    </div>
</div>
{% endblock %}
