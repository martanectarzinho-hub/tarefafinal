{% extends 'gestao/base.html' %}

{% block content %}
<div class="card shadow">
    <div class="card-body">
        <h2 class="card-title">🍽️ {{ prato.nome }}</h2>
        <hr>
        <p><strong>Categoria:</strong> {{ prato.categoria }}</p>
        <p><strong>Preço:</strong> {{ prato.preco }}€</p>
        <p><strong>Descrição:</strong> {{ prato.descricao }}</p>
        <div class="mt-4">
            <a href="{% url 'editar_prato' prato.pk %}" class="btn btn-warning">Editar</a>
            <a href="{% url 'apagar_prato' prato.pk %}" class="btn btn-danger">Apagar</a>
            <a href="{% url 'lista_pratos' %}" class="btn btn-secondary">Voltar</a>
        </div>
    </div>
</div>
{% endblock %}
